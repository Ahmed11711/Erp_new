<div class="container-fluid accounting-tree-container">
  <div class="row">
    <div class="col-12">
      <div class="header-section">
        <h2>شجرة الحسابات</h2>
        <div class="header-search-wrap">
          <input
            type="search"
            class="form-control tree-search-input"
            [(ngModel)]="searchTerm"
            (ngModelChange)="applySearchFilter()"
            placeholder="بحث تلقائي بالكود أو الاسم..."
            dir="rtl"
            autocomplete="off"
          />
          <button
            type="button"
            class="btn-clear-search"
            *ngIf="searchTerm.trim()"
            (click)="clearSearch()"
            title="مسح البحث"
            aria-label="مسح البحث"
          >
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="header-actions">
          <button class="btn btn-outline-secondary" (click)="recalculateAllBalances()" [disabled]="loading || recalculating" title="إعادة حساب جميع الأرصدة وتحديث الشجرة">
            <i class="fas fa-sync-alt" [class.fa-spin]="recalculating"></i> إعادة حساب الأرصدة
          </button>
          <button class="btn btn-primary" (click)="openAddDialog()" [disabled]="loading">
            <i class="fas fa-plus"></i> إضافة حساب رئيسي
          </button>
        </div>
      </div>

      <div class="loading-spinner" *ngIf="loading">
        <div class="spinner-border text-primary" role="status">
          <span class="sr-only">جاري التحميل...</span>
        </div>
      </div>

      <div class="tree-container" *ngIf="!loading">
        <div *ngIf="treeData.length === 0" class="empty-state">
          <p>لا توجد حسابات. ابدأ بإضافة حساب رئيسي.</p>
        </div>

        <div *ngIf="treeData.length > 0 && displayTree.length === 0" class="empty-state">
          <p>لا توجد حسابات تطابق البحث.</p>
          <button type="button" class="btn btn-link p-0" (click)="clearSearch()">مسح البحث</button>
        </div>

        <ul class="tree-list" *ngIf="displayTree.length > 0">
          <ng-container *ngTemplateOutlet="renderNode; context: { $implicit: displayTree, indent: 0 }"></ng-container>
        </ul>
      </div>
    </div>
  </div>
</div>

<!-- Recursive node renderer -->
<ng-template #renderNode let-nodes let-indent="indent">
  <li *ngFor="let node of nodes" class="tree-node">
    <div class="node-content" [style.padding-left.px]="indent" [class.search-match]="isSearchMatch(node)">
      <span class="expand-icon" (click)="toggleNode(node.id!)" *ngIf="node.children && node.children.length > 0">
        <i class="fas" [ngClass]="isExpanded(node.id!) ? 'fa-chevron-down' : 'fa-chevron-right'"></i>
      </span>
      <span class="expand-placeholder" *ngIf="!node.children || node.children.length === 0"></span>

      <span class="account-code">{{ node.code }}</span>
      <span class="account-name">{{ node.name }}</span>
      <span class="account-type-badge" [class]="'type-' + node.type">
        {{ getAccountTypeLabel(node.type) }}
      </span>
      <span class="account-balance">{{ node.balance || 0 | number:'1.2-2' }}</span>

      <div class="node-actions">
        <button class="btn btn-sm btn-success" *ngIf="canAddChild(node)" (click)="openAddDialog(node.id!)" title="إضافة حساب فرعي">
          <i class="fas fa-plus"></i>
        </button>
        <button class="btn btn-sm btn-info" (click)="openEditDialog(node)" title="تعديل">
          <i class="fas fa-edit"></i>
        </button>
        <button class="btn btn-sm btn-danger" (click)="deleteAccount(node)" title="حذف">
          <i class="fas fa-trash"></i>
        </button>
      </div>
    </div>

    <ul class="children-list" *ngIf="node.children && node.children.length > 0 && isExpanded(node.id!)">
      <ng-container *ngTemplateOutlet="renderNode; context: { $implicit: node.children, indent: indent + 20 }"></ng-container>
    </ul>
  </li>
</ng-template>

<!-- Add Account Dialog -->
<div class="modal-overlay" *ngIf="showAddDialog" (click)="closeDialogs()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>إضافة حساب جديد</h3>
      <button class="close-btn" (click)="closeDialogs()">&times;</button>
    </div>
    <div class="modal-body">
      <form>
        <div class="form-group">
          <label>اسم الحساب *</label>
          <input type="text" class="form-control" [(ngModel)]="newAccount.name" name="name" required>
        </div>
        <div class="form-group">
          <label>اسم الحساب بالإنجليزية</label>
          <input type="text" class="form-control" [(ngModel)]="newAccount.name_en" name="name_en">
        </div>
        <div class="form-group">
          <label>نوع الحساب *</label>
          <select class="form-control" [(ngModel)]="newAccount.type" name="type" required>
            <option *ngFor="let type of accountTypes" [value]="type.value">{{ type.label }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>نوع الحساب المحاسبي</label>
          <select class="form-control" [(ngModel)]="newAccount.account_type" name="account_type">
            <option *ngFor="let option of accountTypeOptions" [value]="option.value">{{ option.label }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>الرصيد الافتتاحي</label>
          <input type="number" class="form-control" [(ngModel)]="newAccount.balance" name="balance" step="0.01">
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" [(ngModel)]="newAccount.is_trading_account" name="is_trading_account">
            حساب تداول
          </label>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="closeDialogs()">إلغاء</button>
      <button class="btn btn-primary" (click)="saveAccount()">حفظ</button>
    </div>
  </div>
</div>

<!-- Edit Account Dialog -->
<div class="modal-overlay" *ngIf="showEditDialog && selectedAccount" (click)="closeDialogs()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>تعديل الحساب</h3>
      <button class="close-btn" (click)="closeDialogs()">&times;</button>
    </div>
    <div class="modal-body">
      <form>
        <div class="form-group">
          <label>اسم الحساب *</label>
          <input type="text" class="form-control" [(ngModel)]="selectedAccount.name" name="name" required>
        </div>
        <div class="form-group">
          <label>اسم الحساب بالإنجليزية</label>
          <input type="text" class="form-control" [(ngModel)]="selectedAccount.name_en" name="name_en">
        </div>
        <div class="form-group">
          <label>نوع الحساب *</label>
          <select class="form-control" [(ngModel)]="selectedAccount.type" name="type" required>
            <option *ngFor="let type of accountTypes" [value]="type.value">{{ type.label }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>نوع الحساب المحاسبي</label>
          <select class="form-control" [(ngModel)]="selectedAccount.account_type" name="account_type">
            <option *ngFor="let option of accountTypeOptions" [value]="option.value">{{ option.label }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>الرصيد الافتتاحي</label>
          <input type="number" class="form-control" [(ngModel)]="selectedAccount.balance" name="balance" step="0.01">
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" [(ngModel)]="selectedAccount.is_trading_account" name="is_trading_account">
            حساب تداول
          </label>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="closeDialogs()">إلغاء</button>
      <button class="btn btn-primary" (click)="updateAccount()">حفظ التغييرات</button>
    </div>
  </div>
</div>

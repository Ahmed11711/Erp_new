<div dir="rtl" class="d-flex justify-content-between">
  <h1 mat-dialog-title>إرسال رسالة واتساب</h1>
</div>
<div mat-dialog-content>
  <!-- قوالب ميتا (للتواصل الأول / خارج نافذة 24 ساعة) -->
  <div class="form-group mb-3" *ngIf="data.order || data.orders?.length">
    <label>رقم واتساب (للعرض: القوالب التابعة للرقم فقط)</label>
    <select class="form-control mb-2" [(ngModel)]="selectedPhoneNumberId" [ngModelOptions]="{standalone: true}" (ngModelChange)="onPhoneNumberChange()" *ngIf="userPhoneNumbers.length > 1">
      <option [ngValue]="null">جميع الأرقام</option>
      <option *ngFor="let p of userPhoneNumbers" [ngValue]="p.id">{{ p.name }}</option>
    </select>
    <label>قوالب ميتا المعتمدة</label>
    <select class="form-control" [(ngModel)]="selectedMetaTemplate" [ngModelOptions]="{standalone: true}">
      <option [ngValue]="null">اختر قالب ميتا (اختياري)</option>
      <option *ngFor="let t of metaTemplates" [ngValue]="t">{{ t.name }} ({{ t.language }})</option>
    </select>
    <small class="text-muted" *ngIf="selectedMetaTemplate">
      {{ selectedMetaTemplate.body_params?.join('، ') }}
    </small>
    <div class="mt-2" *ngIf="selectedMetaTemplate">
      <button type="button" class="btn btn-primary" [disabled]="sendingMeta" (click)="sendMetaTemplate()">
        <span *ngIf="sendingMeta">جاري الإرسال...</span>
        <span *ngIf="!sendingMeta">إرسال قالب ميتا</span>
      </button>
    </div>
  </div>

  <hr *ngIf="(data.order || data.orders?.length) && metaTemplates.length" class="my-3">

  <form dir="rtl" class="text-first w-100 mt-2" [formGroup]="form" (ngSubmit)="submitform()">
    
    <div class="form-group" *ngIf="templates.length > 0">
      <label>استخدام قالب (نص حر)</label>
      <select class="form-control" formControlName="template_id" (change)="useTemplate($any($event.target).value)">
        <option [value]="null">اختر قالب (اختياري)</option>
        <option *ngFor="let template of templates" [value]="template.id">{{template.name}}</option>
      </select>
    </div>

    <div class="form-group">
      <label>الرسالة</label>
      <textarea 
        class="form-control" 
        rows="5"
        placeholder="اكتب الرسالة هنا..."
        [class.is-valid]="form.get('message')?.errors == null && form.get('message')?.touched"
        formControlName="message"
      ></textarea>
      <p *ngIf="form.get('message')?.errors != null && form.get('message')?.touched"
        class="error mb-0 text-danger">مطلوب</p>
    </div>

    <div class="d-flex justify-content-center">
      <button 
        class="btn btn-success" 
        [disabled]="form.invalid || loading"
        type="submit"
      >
        <span *ngIf="loading">جاري الإرسال...</span>
        <span *ngIf="!loading">إرسال</span>
      </button>
      <a mat-button (click)="onCloseClick()" class="btn btn-danger mx-2">إلغاء</a>
    </div>
  </form>
</div>
